<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<div class="blog-share">
    <p class="blog-share__label">
        <f:translate key="blog.share.label" extensionName="Aisteablog" />
    </p>
    <div class="blog-share__buttons">

        <a href="https://www.linkedin.com/sharing/share-offsite/?url={shareUrl -> f:format.urlencode()}"
           class="blog-share__btn blog-share__btn--linkedin"
           target="_blank"
           rel="noopener noreferrer"
           aria-label="{f:translate(key: 'blog.share.linkedin', extensionName: 'Aisteablog')}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/>
            </svg>
            <f:translate key="blog.share.linkedin" extensionName="Aisteablog" />
        </a>

        <a href="https://twitter.com/intent/tweet?url={shareUrl -> f:format.urlencode()}&text={post.title -> f:format.urlencode()}"
           class="blog-share__btn blog-share__btn--twitter"
           target="_blank"
           rel="noopener noreferrer"
           aria-label="{f:translate(key: 'blog.share.twitter', extensionName: 'Aisteablog')}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
            <f:translate key="blog.share.twitter" extensionName="Aisteablog" />
        </a>

        <button
            class="blog-share__btn blog-share__btn--copy"
            type="button"
            data-url="{shareUrl}"
            data-label-copy="{f:translate(key: 'blog.share.copy', extensionName: 'Aisteablog')}"
            data-label-copied="{f:translate(key: 'blog.share.copied', extensionName: 'Aisteablog')}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <f:translate key="blog.share.copy" extensionName="Aisteablog" />
        </button>

    </div>
</div>

<script>
(function () {
    document.querySelectorAll('.blog-share__btn--copy').forEach(function (btn) {
        btn.addEventListener('click', function () {
            navigator.clipboard.writeText(btn.dataset.url).then(function () {
                var svg = btn.querySelector('svg');
                btn.textContent = btn.dataset.labelCopied;
                if (svg) btn.prepend(svg);
                btn.classList.add('blog-share__btn--copied');
                setTimeout(function () {
                    btn.textContent = btn.dataset.labelCopy;
                    if (svg) btn.prepend(svg);
                    btn.classList.remove('blog-share__btn--copied');
                }, 2500);
            });
        });
    });
}());
</script>

</html>
